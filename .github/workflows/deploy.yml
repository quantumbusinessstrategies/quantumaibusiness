name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_LEAD_WEBHOOK_URL: ${{ vars.VITE_LEAD_WEBHOOK_URL }}
          VITE_OWNER_NOTIFICATION_URL: ${{ vars.VITE_OWNER_NOTIFICATION_URL }}
          VITE_AUDIT_PAYMENT_URL: ${{ vars.VITE_AUDIT_PAYMENT_URL }}
          VITE_OVERHAUL_PAYMENT_URL: ${{ vars.VITE_OVERHAUL_PAYMENT_URL }}
          VITE_LIFETIME_INSIGHT_PAYMENT_URL: ${{ vars.VITE_LIFETIME_INSIGHT_PAYMENT_URL }}
          VITE_FULL_SPECTRUM_PAYMENT_URL: ${{ vars.VITE_FULL_SPECTRUM_PAYMENT_URL }}
          VITE_OUTLINED_STRATEGY_PAYMENT_URL: ${{ vars.VITE_OUTLINED_STRATEGY_PAYMENT_URL }}
          VITE_AUTOMATED_UTILITY_PAYMENT_URL: ${{ vars.VITE_AUTOMATED_UTILITY_PAYMENT_URL }}
          VITE_FULL_STRATEGIC_PAYMENT_URL: ${{ vars.VITE_FULL_STRATEGIC_PAYMENT_URL }}
          VITE_PREMIUM_REFERRAL_URL: ${{ vars.VITE_PREMIUM_REFERRAL_URL }}
          VITE_GOOGLE_TAG_ID: ${{ vars.VITE_GOOGLE_TAG_ID }}
          VITE_META_PIXEL_ID: ${{ vars.VITE_META_PIXEL_ID }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
